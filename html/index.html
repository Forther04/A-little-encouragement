<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Animated Letter</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="envelope-wrapper" onclick="this.classList.toggle('open')">
    <div class="envelope">
      
      <div class="flap"></div>
      
      <div class="letter-paper">
        <div class="letter-content">
          <h2>Hello!</h2>
          <p>You did it! This letter is fully responsive, perfectly centered, and floats up while the envelope beautifully fades away.</p>
        </div>
      </div>
      
      <div class="envelope-front"></div>
      
    </div>
  </div>

</body>
</html>
